<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="20" fill="#13051f"/>
  <!-- Outer glow ring -->
  <circle cx="20" cy="20" r="17" stroke="#9963ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Synthwave sun horizon lines (lower half) -->
  <clipPath id="lower-half">
    <rect x="0" y="20" width="40" height="20"/>
  </clipPath>
  <circle cx="20" cy="20" r="13" fill="url(#sun-gradient)" clip-path="url(#lower-half)"/>
  <!-- Horizon scan lines over sun -->
  <line x1="7" y1="23" x2="33" y2="23" stroke="#13051f" stroke-width="1.2"/>
  <line x1="7" y1="26.5" x2="33" y2="26.5" stroke="#13051f" stroke-width="1.8"/>
  <line x1="7" y1="30.5" x2="33" y2="30.5" stroke="#13051f" stroke-width="2.4"/>
  <!-- Upper half arc (synthwave glow arch) -->
  <path d="M7 20 A13 13 0 0 1 33 20" fill="none" stroke="url(#arch-gradient)" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2.5" fill="#d21e85"/>
  <defs>
    <linearGradient id="sun-gradient" x1="20" y1="20" x2="20" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d21e85"/>
      <stop offset="1" stop-color="#541f73"/>
    </linearGradient>
    <linearGradient id="arch-gradient" x1="7" y1="20" x2="33" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9963ff"/>
      <stop offset="0.5" stop-color="#d21e85"/>
      <stop offset="1" stop-color="#9963ff"/>
    </linearGradient>
  </defs>
</svg>
